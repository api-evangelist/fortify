name: Fortify
description: Fortify is a comprehensive application security platform from OpenText that provides static application security
  testing (SAST), dynamic application security testing (DAST), and software composition analysis (SCA) capabilities. It helps
  organizations identify and remediate vulnerabilities across the software development lifecycle.
image: https://www.microfocus.com/brand/fortify-logo.png
url: https://www.opentext.com/products/fortify-on-demand
