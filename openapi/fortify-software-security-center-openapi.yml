components:
  securitySchemes:
    fortifyToken:
      type: apiKey
      in: header
      name: Authorization
      description: >-
        Fortify token-based authentication. Pass as: FortifyToken <token_value>.
        Obtain a token via POST /api/v1/tokens with HTTP Basic credentials.
    basicAuth:
      type: http
      scheme: basic
      description: >-
        HTTP Basic authentication. Only supported on the /tokens endpoint for
        obtaining API tokens.
  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      description: Unique identifier of the resource
      schema:
        type: integer
        format: int64
    ParentId:
      name: parentId
      in: path
      required: true
      description: Unique identifier of the parent resource
      schema:
        type: integer
        format: int64
    Start:
      name: start
      in: query
      description: Starting index for pagination (0-based)
      schema:
        type: integer
        format: int32
        default: 0
    PageLimit:
      name: limit
      in: query
      description: Maximum number of records to return
      schema:
        type: integer
        format: int32
        default: 200
    Q:
      name: q
      in: query
      description: >-
        Search query using Fortify search syntax (e.g., name:MyApp)
      schema:
        type: string
    OrderBy:
      name: orderby
      in: query
      description: >-
        Sort field and direction (e.g., name for ascending, -name for
        descending)
      schema:
        type: string
    Fields:
      name: fields
      in: query
      description: Comma-separated list of fields to include in the response
      schema:
        type: string
  schemas:
    Project:
      type: object
      description: Represents a top-level project in SSC
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        name:
          type: string
          description: Project name
        description:
          type: string
          description: Project description
        creationDate:
          type: string
          format: date-time
          description: Date when the project was created
        issueTemplateId:
          type: string
          description: Issue template identifier
    ProjectVersion:
      type: object
      description: Represents an application version within a project
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        name:
          type: string
          description: Version name
        description:
          type: string
          description: Version description
        active:
          type: boolean
          description: Whether the version is active
        committed:
          type: boolean
          description: Whether the version is committed
        project:
          $ref: '#/components/schemas/Project'
        createdBy:
          type: string
          description: User who created the version
        creationDate:
          type: string
          format: date-time
          description: Creation date
        issueTemplateId:
          type: string
          description: Issue template identifier
        currentState:
          type: object
          properties:
            committed:
              type: boolean
            analysisResultsExist:
              type: boolean
            hasCustomIssues:
              type: boolean
            auditEnabled:
              type: boolean
    Issue:
      type: object
      description: Represents a vulnerability issue
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        issueInstanceId:
          type: string
          description: Instance identifier
        issueName:
          type: string
          description: Name of the issue
        primaryLocation:
          type: string
          description: Primary source file location
        lineNumber:
          type: integer
          format: int32
          description: Line number of the issue
        fullFileName:
          type: string
          description: Full file path
        frilessSeverity:
          type: number
          format: float
          description: Friless severity score
        severity:
          type: number
          format: float
          description: Numeric severity score
        confidence:
          type: number
          format: float
          description: Confidence score
        kingdom:
          type: string
          description: Vulnerability kingdom
        issueStatus:
          type: string
          description: Current issue status
        removedDate:
          type: string
          format: date-time
          description: Date when the issue was removed
        foundDate:
          type: string
          format: date-time
          description: Date when the issue was first found
        hasAttachments:
          type: boolean
          description: Whether the issue has attachments
        hasCorrelatedIssues:
          type: boolean
          description: Whether the issue has correlated issues
        scanStatus:
          type: string
          description: Scan status
        engineCategory:
          type: string
          description: Engine category
        audienceSet:
          type: boolean
          description: Whether the audience is set
        reviewed:
          type: boolean
          description: Whether the issue has been reviewed
        issueState:
          type: string
          description: State of the issue
        analyzer:
          type: string
          description: Analyzer that found the issue
        primaryTag:
          type: string
          description: Primary tag value
        folderGuid:
          type: string
          description: Folder GUID
        projectVersionId:
          type: integer
          format: int64
          description: Parent project version identifier
    Artifact:
      type: object
      description: Represents an uploaded scan artifact
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        fileName:
          type: string
          description: Name of the uploaded file
        fileSize:
          type: integer
          format: int64
          description: File size in bytes
        status:
          type: string
          description: Processing status
          enum:
            - SCHED_PROCESSING
            - PROCESSING
            - PROCESS_COMPLETE
            - ERROR_PROCESSING
            - REQUIRE_AUTH
            - DELETED
        uploadDate:
          type: string
          format: date-time
          description: Date when the artifact was uploaded
        messages:
          type: string
          description: Processing messages
        allowDelete:
          type: boolean
          description: Whether the artifact can be deleted
        allowApprove:
          type: boolean
          description: Whether the artifact requires approval
        allowPurge:
          type: boolean
          description: Whether the artifact can be purged
        scanTypes:
          type: array
          description: Types of scans in this artifact
          items:
            type: string
    AuthToken:
      type: object
      description: Represents an authentication token
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        token:
          type: string
          description: The token value
        creationDate:
          type: string
          format: date-time
          description: When the token was created
        terminalDate:
          type: string
          format: date-time
          description: When the token expires
        remainingUsages:
          type: integer
          format: int32
          description: Remaining number of uses
        type:
          type: string
          description: Token type
          enum:
            - UnifiedLoginToken
            - AnalysisUploadToken
            - AuditToken
            - DownloadFileTransferToken
            - UploadFileTransferToken
            - ReportFileTransferToken
    LocalUser:
      type: object
      description: Represents a local user account
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        userName:
          type: string
          description: Username
        firstName:
          type: string
          description: First name
        lastName:
          type: string
          description: Last name
        email:
          type: string
          description: Email address
        suspended:
          type: boolean
          description: Whether the account is suspended
        roles:
          type: array
          description: Assigned roles
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
    AttributeDefinition:
      type: object
      description: Represents an attribute definition
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        guid:
          type: string
          description: GUID of the attribute
        name:
          type: string
          description: Attribute name
        category:
          type: string
          description: Attribute category
          enum:
            - TECHNICAL
            - BUSINESS
            - ORGANIZATION
            - DYNAMIC_SCAN_REQUEST
        type:
          type: string
          description: Attribute data type
          enum:
            - TEXT
            - LONG_TEXT
            - SINGLE
            - MULTIPLE
            - INTEGER
            - BOOLEAN
            - DATE
            - FILE
            - SENSITIVE_TEXT
        required:
          type: boolean
          description: Whether the attribute is required
        hidden:
          type: boolean
          description: Whether the attribute is hidden
    AttributeValue:
      type: object
      description: An attribute value assignment
      properties:
        attributeDefinitionId:
          type: integer
          format: int64
          description: Attribute definition identifier
        guid:
          type: string
          description: Attribute GUID
        value:
          type: string
          description: Attribute value
        values:
          type: array
          items:
            type: object
            properties:
              guid:
                type: string
              name:
                type: string
    AuthEntity:
      type: object
      description: An authentication entity (user or LDAP group)
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        entityName:
          type: string
          description: Entity name
        isLdap:
          type: boolean
          description: Whether this is an LDAP entity
    CustomTag:
      type: object
      description: A custom tag for issue classification
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        guid:
          type: string
          description: GUID of the custom tag
        name:
          type: string
          description: Custom tag name
        valueType:
          type: string
          description: Value type
        valueList:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
                format: int64
              lookupValue:
                type: string
              lookupIndex:
                type: integer
                format: int32
    ReportDefinition:
      type: object
      description: A report definition template
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        name:
          type: string
          description: Report name
        templateDocId:
          type: integer
          format: int64
          description: Template document identifier
        type:
          type: string
          description: Report type
          enum:
            - ISSUE
            - PROJECT
            - PORTFOLIO
        parameters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              identifier:
                type: string
    SavedReport:
      type: object
      description: A generated report
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier
        name:
          type: string
          description: Report name
        status:
          type: string
          description: Report generation status
          enum:
            - SCHED_PROCESSING
            - PROCESSING
            - PROCESS_COMPLETE
            - ERROR_PROCESSING
        format:
          type: string
          description: Report output format
        generationDate:
          type: string
          format: date-time
          description: Date when the report was generated
        reportDefinitionId:
          type: integer
          format: int64
          description: Source report definition
    Job:
      type: object
      description: Represents a processing job
      properties:
        jobName:
          type: string
          description: Name of the job
        jobGroup:
          type: string
          description: Job group
        jobClassName:
          type: string
          description: Java class name
        state:
          type: string
          description: Job state
          enum:
            - PREPARED
            - RUNNING
            - FINISHED
            - FAILED
            - CANCELLED
            - WAITING_FOR_WORKER
        priority:
          type: integer
          format: int32
        projectVersionId:
          type: integer
          format: int64
        artifactId:
          type: integer
          format: int64
    FileToken:
      type: object
      description: A single-use file transfer token
      properties:
        token:
          type: string
          description: Token value
        fileTokenType:
          type: string
          description: Token type
          enum:
            - UPLOAD
            - DOWNLOAD
            - REPORT_FILE
    CreateProjectRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        issueTemplateId:
          type: string
    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        issueTemplateId:
          type: string
    CreateProjectVersionRequest:
      type: object
      required:
        - name
        - project
      properties:
        name:
          type: string
          description: Version name
        description:
          type: string
          description: Version description
        active:
          type: boolean
          default: true
        committed:
          type: boolean
          default: false
        project:
          type: object
          properties:
            id:
              type: integer
              format: int64
            name:
              type: string
        issueTemplateId:
          type: string
    UpdateProjectVersionRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        active:
          type: boolean
        committed:
          type: boolean
        issueTemplateId:
          type: string
    ProjectVersionActionRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          description: Action to perform
          enum:
            - commit
            - COPY_CURRENT_STATE
            - COPY_FROM_PARTIAL
            - SEND_FOR_TRAINING
            - SEND_FOR_PREDICTION
        values:
          type: object
          description: Action-specific parameters
    CreateTokenRequest:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          description: Token type
          enum:
            - UnifiedLoginToken
            - AnalysisUploadToken
            - AuditToken
            - DownloadFileTransferToken
            - UploadFileTransferToken
            - ReportFileTransferToken
        description:
          type: string
          description: Token description
        terminalDate:
          type: string
          format: date-time
          description: Token expiration date
    CreateLocalUserRequest:
      type: object
      required:
        - userName
        - firstName
        - lastName
        - email
        - password
      properties:
        userName:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
        passwordNeverExpires:
          type: boolean
        suspended:
          type: boolean
        roles:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
    UpdateLocalUserRequest:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        password:
          type: string
        suspended:
          type: boolean
        roles:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
    CreateAttributeDefinitionRequest:
      type: object
      required:
        - name
        - type
        - category
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - TEXT
            - LONG_TEXT
            - SINGLE
            - MULTIPLE
            - INTEGER
            - BOOLEAN
            - DATE
        category:
          type: string
          enum:
            - TECHNICAL
            - BUSINESS
            - ORGANIZATION
        required:
          type: boolean
        hidden:
          type: boolean
        description:
          type: string
    GenerateReportRequest:
      type: object
      required:
        - name
        - reportDefinitionId
      properties:
        name:
          type: string
          description: Name for the generated report
        reportDefinitionId:
          type: integer
          format: int64
          description: Report definition to use
        format:
          type: string
          description: Output format
          enum:
            - PDF
            - DOC
            - XLS
        inputReportParameters:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              identifier:
                type: string
              paramValue:
                type: string
    CreateFileTokenRequest:
      type: object
      required:
        - fileTokenType
      properties:
        fileTokenType:
          type: string
          enum:
            - UPLOAD
            - DOWNLOAD
            - REPORT_FILE
    ProjectListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        count:
          type: integer
          format: int32
    ProjectVersionListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ProjectVersion'
        count:
          type: integer
          format: int32
    IssueListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Issue'
        count:
          type: integer
          format: int32
    ArtifactListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
        count:
          type: integer
          format: int32
    AttributeValueListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AttributeValue'
        count:
          type: integer
          format: int32
    AuthEntityListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuthEntity'
        count:
          type: integer
          format: int32
    CustomTagListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CustomTag'
        count:
          type: integer
          format: int32
    LocalUserListResponse:
      type: object
      properties:
        data:
