      description: Marks one or more notifications as read.
      tags:
        - Notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarkNotificationsAsReadRequest'
      responses:
        '204':
          description: Notifications marked as read successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/lookup-items:
    get:
      operationId: listLookupItems
      summary: Fortify List lookup items
      description: >-
        Returns a list of lookup items for the specified type, providing
        reference data such as scan types, time zones, and status values.
      tags:
        - Lookup Items
      parameters:
        - name: type
          in: query
          required: true
          description: The type of lookup items to retrieve
          schema:
            type: string
            enum:
              - AnalysisStatusTypes
              - ApplicationTypes
              - AssessmentTypes
              - AuditActionTypes
              - AuditTemplateConditionTypes
              - BusinessCriticalityTypes
              - DynamicScanEnvironmentFacingTypes
              - MobileScanFrameworkTypes
              - MobileScanPlatformTypes
              - ScanStatusTypes
              - ScanTypes
              - SDLCStatusTypes
              - TimeZones
              - TechnologyTypes
              - LanguageLevels
              - AuditPreferenceTypes
              - EntitlementFrequencyTypes
              - ReportTypes
              - ReportStatusTypes
              - ReportFormats
              - DastAutomatedScanTypes
              - RepeatScheduleTypes
      responses:
        '200':
          description: Successful response with list of lookup items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LookupItemListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/eventlogs/download:
    get:
      operationId: downloadEventLogs
      summary: Fortify Download event logs
      description: >-
        Downloads the last 24 hours of event log data in CSV format for the
        tenant.
      tags:
        - Event Logs
      responses:
        '200':
          description: Event log CSV file download
          content:
            application/x-download:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/fortify-on-demand-connect-networks:
    get:
      operationId: listFortifyConnectNetworks
      summary: List Fortify Connect networks
      description: >-
        Retrieves a list of Fortify on Demand Connect networks configured for
        the tenant, enabling scanning of internal applications.
      tags:
        - Applications
      responses:
        '200':
          description: >-
            Successful response with list of Fortify Connect networks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FortifyConnectNetworkListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >-
        OAuth2 Bearer token obtained from POST /oauth/token using either
        client_credentials or password grant type.
  parameters:
    ApplicationId:
      name: applicationId
      in: path
      required: true
      description: Unique identifier of the application
      schema:
        type: integer
        format: int32
    ReleaseId:
      name: releaseId
      in: path
      required: true
      description: Unique identifier of the release
      schema:
        type: integer
        format: int32
    Filters:
      name: filters
      in: query
      description: >-
        Filter expression using Fortify on Demand filter syntax. Multiple
        filters can be combined.
      schema:
        type: string
    OrderBy:
      name: orderBy
      in: query
      description: Field name to sort results by
      schema:
        type: string
    OrderByDirection:
      name: orderByDirection
      in: query
      description: Sort direction
      schema:
        type: string
        enum:
          - ASC
          - DESC
    Fields:
      name: fields
      in: query
      description: Comma-separated list of fields to include in the response
      schema:
        type: string
    Offset:
      name: offset
      in: query
      description: Number of records to skip for pagination
      schema:
        type: integer
        format: int32
        default: 0
    Limit:
      name: limit
      in: query
      description: Maximum number of records to return (max 50)
      schema:
        type: integer
        format: int32
        default: 50
        maximum: 50
  schemas:
    Application:
      type: object
      description: Represents an application in Fortify on Demand
      properties:
        applicationId:
          type: integer
          format: int32
          description: Unique identifier of the application
        applicationName:
          type: string
          description: Name of the application
        applicationDescription:
          type: string
          description: Description of the application
        applicationCreatedDate:
          type: string
          format: date-time
          description: Date when the application was created
        businessCriticalityType:
          type: string
          description: Business criticality classification
        emailList:
          type: string
          description: Comma-separated list of notification email addresses
        hasMicroservices:
          type: boolean
          description: Whether the application has microservices configured
        attributes:
          type: array
          description: Application attributes
          items:
            $ref: '#/components/schemas/ApplicationAttribute'
    ApplicationAttribute:
      type: object
      description: An attribute value assigned to an application
      properties:
        id:
          type: integer
          format: int32
          description: Attribute identifier
        name:
          type: string
          description: Attribute name
        value:
          type: string
          description: Attribute value
    ApplicationListResponse:
      type: object
      description: Paginated list of applications
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Application'
        totalCount:
          type: integer
          format: int32
          description: Total number of applications matching the query
    PostApplicationRequest:
      type: object
      description: Request body for creating an application
      required:
        - applicationName
        - applicationDescription
        - businessCriticalityType
        - releaseName
        - sdlcStatusType
      properties:
        applicationName:
          type: string
          description: Name of the application
        applicationDescription:
          type: string
          description: Description of the application
        businessCriticalityType:
          type: string
          description: Business criticality classification
          enum:
            - High
            - Medium
            - Low
        releaseName:
          type: string
          description: Name of the initial release
        releaseDescription:
          type: string
          description: Description of the initial release
        sdlcStatusType:
          type: string
          description: Software development lifecycle status
          enum:
            - Development
            - QA
            - Production
            - Retired
        emailList:
          type: string
          description: Comma-separated list of notification email addresses
        hasMicroservices:
          type: boolean
          description: Whether the application uses microservices
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationAttribute'
    PostApplicationResponse:
      type: object
      description: Response after creating an application
      properties:
        applicationId:
          type: integer
          format: int32
          description: Identifier of the newly created application
        releaseId:
          type: integer
          format: int32
          description: Identifier of the initial release
        success:
          type: boolean
          description: Whether the operation succeeded
    PutApplicationRequest:
      type: object
      description: Request body for updating an application
      properties:
        applicationName:
          type: string
          description: Name of the application
        applicationDescription:
          type: string
          description: Description of the application
        businessCriticalityType:
          type: string
          description: Business criticality classification
        emailList:
          type: string
          description: Comma-separated list of notification email addresses
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationAttribute'
    PutApplicationResponse:
      type: object
      description: Response after updating an application
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
    Release:
      type: object
      description: Represents a release within an application
      properties:
        releaseId:
          type: integer
          format: int32
          description: Unique identifier of the release
        releaseName:
          type: string
          description: Name of the release
        releaseDescription:
          type: string
          description: Description of the release
        applicationId:
          type: integer
          format: int32
          description: Identifier of the parent application
        applicationName:
          type: string
          description: Name of the parent application
        sdlcStatusType:
          type: string
          description: Software development lifecycle status
        rating:
          type: number
          format: double
          description: Security rating for the release
        critical:
          type: integer
          format: int32
          description: Number of critical severity issues
        high:
          type: integer
          format: int32
          description: Number of high severity issues
        medium:
          type: integer
          format: int32
          description: Number of medium severity issues
        low:
          type: integer
          format: int32
          description: Number of low severity issues
        issueCount:
          type: integer
          format: int32
          description: Total number of issues
        isPassed:
          type: boolean
          description: Whether the release passes the security policy
        passFailReasonType:
          type: string
          description: Reason for pass or fail status
        currentStaticScanId:
          type: integer
          format: int32
          description: Identifier of the current static scan
        currentDynamicScanId:
          type: integer
          format: int32
          description: Identifier of the current dynamic scan
        currentMobileScanId:
          type: integer
          format: int32
          description: Identifier of the current mobile scan
    ReleaseListResponse:
      type: object
      description: Paginated list of releases
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Release'
        totalCount:
          type: integer
          format: int32
          description: Total number of releases matching the query
    PostReleaseRequest:
      type: object
      description: Request body for creating a release
      required:
        - applicationId
        - releaseName
        - sdlcStatusType
      properties:
        applicationId:
          type: integer
          format: int32
          description: Identifier of the parent application
        releaseName:
          type: string
          description: Name of the release
        releaseDescription:
          type: string
          description: Description of the release
        sdlcStatusType:
          type: string
          description: Software development lifecycle status
          enum:
            - Development
            - QA
            - Production
            - Retired
        microserviceId:
          type: integer
          format: int32
          description: Optional microservice identifier
    PostReleaseResponse:
      type: object
      description: Response after creating a release
      properties:
        releaseId:
          type: integer
          format: int32
          description: Identifier of the newly created release
        success:
          type: boolean
          description: Whether the operation succeeded
    PutReleaseRequest:
      type: object
      description: Request body for updating a release
      properties:
        releaseName:
          type: string
          description: Name of the release
        releaseDescription:
          type: string
          description: Description of the release
        sdlcStatusType:
          type: string
          description: Software development lifecycle status
    PutReleaseResponse:
      type: object
      description: Response after updating a release
      properties:
        success:
          type: boolean
          description: Whether the operation succeeded
    Scan:
      type: object
      description: Represents a security scan
      properties:
        scanId:
          type: integer
          format: int32
          description: Unique identifier of the scan
        scanType:
          type: string
          description: Type of scan performed
          enum:
            - Static
            - Dynamic
            - Mobile
            - OpenSource
        analysisStatusType:
          type: string
          description: Current analysis status
        startedDateTime:
          type: string
          format: date-time
          description: Date and time when the scan started
        completedDateTime:
          type: string
          format: date-time
          description: Date and time when the scan completed
        totalIssues:
          type: integer
          format: int32
          description: Total number of issues found
        issueCountCritical:
          type: integer
          format: int32
          description: Number of critical issues found
        issueCountHigh:
          type: integer
          format: int32
          description: Number of high issues found
        issueCountMedium:
          type: integer
          format: int32
          description: Number of medium issues found
        issueCountLow:
          type: integer
          format: int32
          description: Number of low issues found
        releaseId:
          type: integer
          format: int32
          description: Identifier of the associated release
        applicationId:
          type: integer
          format: int32
          description: Identifier of the associated application
    ScanListResponse:
      type: object
      description: Paginated list of scans
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Scan'
        totalCount:
          type: integer
          format: int32
          description: Total number of scans matching the query
    PollingScanSummary:
      type: object
      description: Scan status for polling
      properties:
        scanId:
          type: integer
          format: int32
          description: Unique identifier of the scan
        analysisStatusType:
          type: string
          description: Current analysis status
        analysisStatusTypeValue:
          type: integer
          format: int32
          description: Numeric value of the analysis status
        pauseDetails:
          type: array
          items:
            type: object
            properties:
              reason:
                type: string
              notes:
                type: string
        passFailStatus:
          type: boolean
          description: Whether the scan passes the security policy
    Vulnerability:
      type: object
      description: Represents a vulnerability finding
      properties:
        vulnId:
          type: integer
          format: int32
          description: Unique identifier of the vulnerability
        releaseId:
          type: integer
          format: int32
          description: Identifier of the associated release
        category:
          type: string
          description: Vulnerability category
        kingdom:
          type: string
          description: Vulnerability kingdom classification
        severity:
          type: integer
          format: int32
          description: Severity level (1-4, where 4 is critical)
        severityString:
          type: string
          description: Human-readable severity string
        assignedUser:
          type: string
          description: User assigned to the vulnerability
        isSuppressed:
          type: boolean
          description: Whether the vulnerability is suppressed
        hasComments:
          type: boolean
          description: Whether the vulnerability has comments
        status:
          type: string
          description: Current audit status
        scanType:
          type: string
          description: Type of scan that found the vulnerability
        primaryLocation:
          type: string
          description: Primary source location of the vulnerability
        lineNumber:
          type: integer
          format: int32
          description: Line number of the vulnerability
        introducedDate:
          type: string
          format: date-time
          description: Date when the vulnerability was first found
        removedDate:
          type: string
          format: date-time
          description: Date when the vulnerability was resolved
    VulnerabilityListResponse:
      type: object
      description: Paginated list of vulnerabilities
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Vulnerability'
        totalCount:
          type: integer
          format: int32
          description: Total number of vulnerabilities matching the query
    ApplicationIssueCountListResponse:
      type: object
      description: Issue counts grouped by severity for an application
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              severityValue:
                type: integer
                format: int32
              count:
                type: integer
                format: int32
              scanType:
                type: string
    ApplicationUserListResponse:
      type: object
      description: List of users associated with an application
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/User'
        totalCount:
          type: integer
          format: int32
    User:
      type: object
      description: Represents a user in the system
      properties:
        userId:
          type: integer
          format: int32
          description: Unique identifier of the user
        userName:
          type: string
          description: Username
        firstName:
          type: string
          description: First name
        lastName:
          type: string
          description: Last name
        email:
          type: string
          description: Email address
    Microservice:
      type: object
      description: Represents a microservice within an application
      properties:
        microserviceId:
          type: integer
          format: int32
          description: Unique identifier of the microservice
        microserviceName:
          type: string
          description: Name of the microservice
        applicationId:
          type: integer
          format: int32
          description: Identifier of the parent application
    MicroserviceListResponse:
      type: object
      description: List of microservices
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Microservice'
        totalCount:
          type: integer
          format: int32
    PostMicroserviceRequest:
      type: object
      description: Request body for creating a microservice
      required:
        - microserviceName
      properties:
        microserviceName:
          type: string
          description: Name of the microservice
    PostMicroserviceResponse:
      type: object
      description: Response after creating a microservice
      properties:
        microserviceId:
          type: integer
          format: int32
        success:
          type: boolean
    OpenSourceComponent:
      type: object
      description: Represents an open source component
      properties:
        componentName:
          type: string
          description: Name of the component
        componentVersion:
          type: string
          description: Version of the component
        license:
          type: string
          description: License of the component
        applicationName:
          type: string
          description: Parent application name
        releaseName:
          type: string
          description: Parent release name
        vulnerabilityCount:
          type: integer
          format: int32
          description: Number of known vulnerabilities
    OpenSourceComponentListResponse:
      type: object
      description: Paginated list of open source components
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OpenSourceComponent'
        totalCount:
          type: integer
          format: int32
    ApiKey:
      type: object
      description: Represents an API key
      properties:
        apiKeyId:
          type: integer
          format: int32
          description: Unique identifier of the API key
        apiKeyName:
          type: string
          description: Name of the API key
        callerIpRange:
          type: string
          description: Allowed IP range for the API key
        apiKeySecret:
          type: string
          description: Secret value of the API key
        createdDate:
          type: string
          format: date-time
          description: Date when the API key was created
    ApiKeyListResponse:
      type: object
      description: Paginated list of API keys
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApiKey'
        totalCount:
          type: integer
          format: int32
    ApiKeyRequest:
      type: object
      description: Request body for creating or updating an API key
      required:
        - apiKeyName
      properties:
        apiKeyName:
          type: string
          description: Name of the API key
        callerIpRange:
          type: string
          description: Allowed IP range
    PostApiKeyResponse:
      type: object
      description: Response after creating an API key
      properties:
        apiKeyId:
          type: integer
          format: int32
        apiKeySecret:
          type: string
        success:
          type: boolean
    ApiKeyResponse:
      type: object
      description: Response for API key operations
      properties:
        success:
          type: boolean
    PersonalAccessToken:
      type: object
      description: Represents a personal access token
      properties:
        personalAccessTokenId:
          type: integer
          format: int32
          description: Unique identifier
        name:
          type: string
          description: Name of the token
        userName:
          type: string
          description: User who owns the token
        secretExpirationDate:
          type: string
          format: date-time
          description: Expiration date of the token secret
    PersonalAccessTokenListResponse:
      type: object
      description: List of personal access tokens
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PersonalAccessToken'
        totalCount:
          type: integer
          format: int32
    PostPersonalAccessTokenRequest:
      type: object
      description: Request body for creating a personal access token
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the token
        secretLifetimeDays:
          type: integer
          format: int32
          description: Number of days until the secret expires
        secretExpirationDate:
          type: string
          format: date-time
          description: Specific expiration date for the secret
    PutPersonalAccessTokenRequest:
      type: object
      description: Request body for updating a personal access token
      properties:
        name:
          type: string
          description: Name of the token
    CreatePersonalAccessTokenResult:
      type: object
      description: Response after creating a personal access token
      properties:
        personalAccessTokenId:
          type: integer
          format: int32
