openapi: 3.1.0
info:
  title: Fortify on Demand API
  description: >-
    REST API for Fortify on Demand (FoD), the cloud-based application security
    testing service from OpenText. Provides programmatic access to manage
    applications, releases, initiate static, dynamic, and mobile scans, retrieve
    vulnerability results, and manage tenant-level settings. Supports OAuth2
    client credentials and resource owner password grant flows for
    authentication.
  version: v3
  contact:
    name: OpenText Fortify Support
    url: https://www.opentext.com/support
    email: fortify-support@microfocus.com
  license:
    name: Proprietary
    url: https://www.opentext.com/about/legal/website-terms-of-use
  x-logo:
    url: https://www.microfocus.com/brand/fortify-logo.png
externalDocs:
  description: Fortify on Demand API Reference
  url: https://api.ams.fortify.com/swagger/ui/index
servers:
  - url: https://api.ams.fortify.com
    description: Fortify on Demand - Americas
  - url: https://api.emea.fortify.com
    description: Fortify on Demand - EMEA
  - url: https://api.apac.fortify.com
    description: Fortify on Demand - APAC
security:
  - bearerAuth: []
tags:
  - name: API Keys
    description: Manage API keys for programmatic access
  - name: Applications
    description: Manage applications and their configurations
  - name: Attributes
    description: Manage application attributes
  - name: Audit Templates
    description: Manage audit templates for vulnerability triage
  - name: DAST Automated Scans
    description: Configure and start DAST automated scans
  - name: Dynamic Scans
    description: Configure and start dynamic application security testing scans
  - name: Event Logs
    description: Access tenant event logs
  - name: Lookup Items
    description: Retrieve lookup and reference data
  - name: Microservices
    description: Manage microservices within applications
  - name: Mobile Scans
    description: Configure and start mobile application security testing scans
  - name: Notifications
    description: Manage user notifications
  - name: Open Source Components
    description: View open source component data
  - name: Open Source Scans
    description: Manage open source / software composition analysis scans
  - name: Personal Access Tokens
    description: Manage personal access tokens
  - name: Releases
    description: Manage releases within applications
  - name: Reports
    description: Generate and download reports
  - name: Scans
    description: View and manage security scans
  - name: Static Scans
    description: Configure and start static application security testing scans
  - name: Vulnerabilities
    description: Access and manage vulnerability findings
paths:
  /api/v3/applications:
    get:
      operationId: listApplications
      summary: Fortify List applications
      description: >-
        Retrieves a paginated collection of applications accessible to the
        authenticated user. Supports filtering, sorting, and field selection.
      tags:
        - Applications
      parameters:
        - $ref: '#/components/parameters/Filters'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/OrderByDirection'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - name: modifiedStartDate
          in: query
          description: Filter applications modified after this date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Successful response with list of applications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: createApplication
      summary: Fortify Create application
      description: >-
        Creates a new application along with an initial release. Requires
        manage-apps scope.
      tags:
        - Applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostApplicationRequest'
      responses:
        '201':
          description: Application created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostApplicationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/applications/{applicationId}:
    get:
      operationId: getApplication
      summary: Fortify Get application
      description: Retrieves an individual application by its unique identifier.
      tags:
        - Applications
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Successful response with application details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      operationId: updateApplication
      summary: Fortify Update application
      description: Updates an existing application's properties and configuration.
      tags:
        - Applications
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutApplicationRequest'
      responses:
        '200':
          description: Application updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutApplicationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: deleteApplication
      summary: Fortify Delete application
      description: >-
        Permanently deletes an application and all associated releases, scans,
        and vulnerability data.
      tags:
        - Applications
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Application deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/applications/{applicationId}/releases:
    get:
      operationId: listApplicationReleases
      summary: Fortify List application releases
      description: >-
        Returns a paginated list of releases belonging to the specified
        application.
      tags:
        - Applications
        - Releases
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/Filters'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/OrderByDirection'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - name: modifiedStartDate
          in: query
          description: Filter releases modified after this date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Successful response with list of releases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/applications/{applicationId}/scans:
    get:
      operationId: listApplicationScans
      summary: Fortify List application scans
      description: Returns a paginated list of scans for the specified application.
      tags:
        - Applications
        - Scans
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/OrderByDirection'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Successful response with list of scans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/applications/{applicationId}/issue-count-by-severity:
    get:
      operationId: getApplicationIssueCountBySeverity
      summary: Fortify Get issue count by severity
      description: >-
        Retrieves the number of issues grouped by severity level for the
        specified application.
      tags:
        - Applications
        - Vulnerabilities
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Successful response with issue counts by severity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationIssueCountListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/applications/{applicationId}/users:
    get:
      operationId: listApplicationUsers
      summary: Fortify List application users
      description: >-
        Returns a list of users that have access to the specified application.
      tags:
        - Applications
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      responses:
        '200':
          description: Successful response with list of application users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationUserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/applications/{applicationId}/microservices:
    get:
      operationId: listApplicationMicroservices
      summary: Fortify List application microservices
      description: >-
        Retrieves a list of microservices associated with the specified
        application.
      tags:
        - Applications
        - Microservices
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - name: includeReleases
          in: query
          description: Whether to include release information for each microservice
          schema:
            type: boolean
      responses:
        '200':
          description: Successful response with list of microservices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MicroserviceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: createApplicationMicroservice
      summary: Fortify Create application microservice
      description: Adds a new microservice to the specified application.
      tags:
        - Applications
        - Microservices
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostMicroserviceRequest'
      responses:
        '201':
          description: Microservice created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostMicroserviceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/applications/{applicationId}/vulnerabilities/{vulnerabilityId}:
    get:
      operationId: getApplicationVulnerability
      summary: Fortify Get application vulnerability
      description: >-
        Returns a list of vulnerabilities matching the specified instance
        identifier within an application.
      tags:
        - Applications
        - Vulnerabilities
      parameters:
        - $ref: '#/components/parameters/ApplicationId'
        - name: vulnerabilityId
          in: path
          required: true
          description: Unique identifier of the vulnerability
          schema:
            type: integer
            format: int32
        - $ref: '#/components/parameters/Filters'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/OrderByDirection'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - name: includeFixed
          in: query
          description: Include fixed vulnerabilities in results
          schema:
            type: boolean
        - name: includeSuppressed
          in: query
          description: Include suppressed vulnerabilities in results
          schema:
            type: boolean
        - name: keywordSearch
          in: query
          description: Keyword search filter for vulnerabilities
          schema:
            type: string
      responses:
        '200':
          description: Successful response with vulnerability details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VulnerabilityListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/applications/owners:
    get:
      operationId: listApplicationOwners
      summary: Fortify List application owners
      description: >-
        Returns a list of users available for application ownership assignment.
      tags:
        - Applications
      responses:
        '200':
          description: Successful response with list of potential application owners
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationUserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/applications/open-source-components:
    get:
      operationId: listOpenSourceComponents
      summary: Fortify List open source components
      description: >-
        Retrieves a collection of open source components across all
        applications.
      tags:
        - Open Source Components
      parameters:
        - name: openSourceScanType
          in: query
          description: Type of open source scan engine
          schema:
            type: string
            enum:
              - Sonatype
              - CycloneDx
              - Debricked
        - $ref: '#/components/parameters/Filters'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/OrderByDirection'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - name: returnTotalComponentCount
          in: query
          description: Whether to include total count in response
          schema:
            type: boolean
      responses:
        '200':
          description: Successful response with list of open source components
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenSourceComponentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/releases:
    get:
      operationId: listReleases
      summary: Fortify List releases
      description: >-
        Returns a paginated list of all releases accessible to the
        authenticated user.
      tags:
        - Releases
      parameters:
        - $ref: '#/components/parameters/Filters'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/OrderByDirection'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
        - name: modifiedStartDate
          in: query
          description: Filter releases modified after this date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Successful response with list of releases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReleaseListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    post:
      operationId: createRelease
      summary: Fortify Create release
      description: Creates a new release within an existing application.
      tags:
        - Releases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostReleaseRequest'
      responses:
        '201':
          description: Release created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostReleaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/releases/{releaseId}:
    get:
      operationId: getRelease
      summary: Fortify Get release
      description: Retrieves details for a specific release by identifier.
      tags:
        - Releases
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
      responses:
        '200':
          description: Successful response with release details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Release'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    put:
      operationId: updateRelease
      summary: Fortify Update release
      description: Updates an existing release's properties and configuration.
      tags:
        - Releases
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutReleaseRequest'
      responses:
        '200':
          description: Release updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutReleaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    delete:
      operationId: deleteRelease
      summary: Fortify Delete release
      description: Permanently deletes the specified release and associated data.
      tags:
        - Releases
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
      responses:
        '200':
          description: Release deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/releases/{releaseId}/scans:
    get:
      operationId: listReleaseScans
      summary: Fortify List release scans
      description: Returns a paginated list of scans for the specified release.
      tags:
        - Releases
        - Scans
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/OrderByDirection'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Successful response with list of scans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScanListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/releases/{releaseId}/scans/{scanId}:
    get:
      operationId: getReleaseScan
      summary: Fortify Get release scan
      description: Returns summary information for the specified scan.
      tags:
        - Releases
        - Scans
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
        - name: scanId
          in: path
          required: true
          description: Unique identifier of the scan
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Successful response with scan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Scan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/releases/{releaseId}/scans/{scanId}/polling-summary:
    get:
      operationId: getReleaseScanPollingSummary
      summary: Fortify Get scan polling summary
      description: >-
        Returns the current scan status for a specific scan, useful for
        polling scan progress.
      tags:
        - Releases
        - Scans
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
        - name: scanId
          in: path
          required: true
          description: Unique identifier of the scan
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: Successful response with scan polling summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollingScanSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/releases/{releaseId}/fpr:
    get:
      operationId: downloadReleaseFpr
      summary: Fortify Download release FPR
      description: >-
        Downloads the Fortify Project Results (FPR) file for the specified
        release and scan type.
      tags:
        - Releases
        - Reports
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
        - name: scanType
          in: query
          description: Type of scan to download FPR for
          schema:
            type: string
            enum:
              - Static
              - Dynamic
              - Mobile
              - Monitoring
              - Network
              - OpenSource
      responses:
        '200':
          description: FPR file download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/releases/{releaseId}/category-rollups:
    get:
      operationId: listReleaseCategoryRollups
      summary: Fortify List vulnerability category rollups
      description: >-
        Returns a list and count of vulnerability categories grouped by
        severity for the specified release.
      tags:
        - Releases
        - Vulnerabilities
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
        - $ref: '#/components/parameters/OrderBy'
        - $ref: '#/components/parameters/OrderByDirection'
        - name: showFixed
          in: query
          description: Include fixed vulnerabilities
          schema:
            type: boolean
        - name: vulnerabilitiesSeverityType
          in: query
          description: Filter by severity type
          schema:
            type: string
      responses:
        '200':
          description: Successful response with category rollup data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryRollupsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/v3/releases/{releaseId}/assessment-types:
    get:
      operationId: listReleaseAssessmentTypes
      summary: Fortify List assessment types
      description: >-
        Returns a list of available assessment types and entitlements for the
        specified release.
      tags:
        - Releases
        - Scans
      parameters:
        - $ref: '#/components/parameters/ReleaseId'
        - name: scanType
          in: query
          required: true
          description: Type of scan to retrieve assessment types for
          schema:
            type: string
            enum:
              - Static
              - Dynamic
              - Mobile
              - OpenSource
        - $ref: '#/components/parameters/Filters'
