naftiko: 1.0.0-alpha2
info:
  label: Fortify ScanCentral DAST API — Sensors
  description: 'Fortify ScanCentral DAST API — Sensors. 4 operations. Lead operation: Fortify List sensors. Self-contained
    Naftiko capability covering one Fortify business surface.'
  tags:
  - Fortify
  - Sensors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FORTIFY_API_KEY: FORTIFY_API_KEY
capability:
  consumes:
  - type: http
    namespace: scancentral-dast-sensors
    baseUri: ''
    description: Fortify ScanCentral DAST API — Sensors business capability. Self-contained, no shared references.
    resources:
    - name: sensors
      path: /sensors
      operations:
      - name: listsensors
        method: GET
        description: Fortify List sensors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter by sensor status
        - name: sensorPoolId
          in: query
          type: string
          description: Filter by sensor pool
    - name: sensors-sensorId
      path: /sensors/{sensorId}
      operations:
      - name: getsensor
        method: GET
        description: Fortify Get sensor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sensorId
          in: path
          type: string
          description: Unique identifier of the sensor
          required: true
      - name: updatesensor
        method: PUT
        description: Fortify Update sensor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sensorId
          in: path
          type: string
          description: Unique identifier of the sensor
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletesensor
        method: DELETE
        description: Fortify Delete sensor
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sensorId
          in: path
          type: string
          description: Unique identifier of the sensor
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.FORTIFY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: scancentral-dast-sensors-rest
    port: 8080
    description: REST adapter for Fortify ScanCentral DAST API — Sensors. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/sensors
      name: sensors
      description: REST surface for sensors.
      operations:
      - method: GET
        name: listsensors
        description: Fortify List sensors
        call: scancentral-dast-sensors.listsensors
        with:
          status: rest.status
          sensorPoolId: rest.sensorPoolId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/sensors/{sensorid}
      name: sensors-sensorid
      description: REST surface for sensors-sensorId.
      operations:
      - method: GET
        name: getsensor
        description: Fortify Get sensor
        call: scancentral-dast-sensors.getsensor
        with:
          sensorId: rest.sensorId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatesensor
        description: Fortify Update sensor
        call: scancentral-dast-sensors.updatesensor
        with:
          sensorId: rest.sensorId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletesensor
        description: Fortify Delete sensor
        call: scancentral-dast-sensors.deletesensor
        with:
          sensorId: rest.sensorId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: scancentral-dast-sensors-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fortify ScanCentral DAST API — Sensors. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: fortify-list-sensors
      description: Fortify List sensors
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scancentral-dast-sensors.listsensors
      with:
        status: tools.status
        sensorPoolId: tools.sensorPoolId
      outputParameters:
      - type: object
        mapping: $.
    - name: fortify-get-sensor
      description: Fortify Get sensor
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: scancentral-dast-sensors.getsensor
      with:
        sensorId: tools.sensorId
      outputParameters:
      - type: object
        mapping: $.
    - name: fortify-update-sensor
      description: Fortify Update sensor
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: scancentral-dast-sensors.updatesensor
      with:
        sensorId: tools.sensorId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: fortify-delete-sensor
      description: Fortify Delete sensor
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: scancentral-dast-sensors.deletesensor
      with:
        sensorId: tools.sensorId
      outputParameters:
      - type: object
        mapping: $.
