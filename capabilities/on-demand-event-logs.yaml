naftiko: 1.0.0-alpha2
info:
  label: Fortify on Demand API — Event Logs
  description: 'Fortify on Demand API — Event Logs. 1 operations. Lead operation: Fortify Download event logs. Self-contained
    Naftiko capability covering one Fortify business surface.'
  tags:
  - Fortify
  - Event Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    FORTIFY_API_KEY: FORTIFY_API_KEY
capability:
  consumes:
  - type: http
    namespace: on-demand-event-logs
    baseUri: https://api.ams.fortify.com
    description: Fortify on Demand API — Event Logs business capability. Self-contained, no shared references.
    resources:
    - name: api-v3-eventlogs-download
      path: /api/v3/eventlogs/download
      operations:
      - name: downloadeventlogs
        method: GET
        description: Fortify Download event logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.FORTIFY_API_KEY}}'
  exposes:
  - type: rest
    namespace: on-demand-event-logs-rest
    port: 8080
    description: REST adapter for Fortify on Demand API — Event Logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/api/v3/eventlogs/download
      name: api-v3-eventlogs-download
      description: REST surface for api-v3-eventlogs-download.
      operations:
      - method: GET
        name: downloadeventlogs
        description: Fortify Download event logs
        call: on-demand-event-logs.downloadeventlogs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: on-demand-event-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Fortify on Demand API — Event Logs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: fortify-download-event-logs
      description: Fortify Download event logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: on-demand-event-logs.downloadeventlogs
      outputParameters:
      - type: object
        mapping: $.
